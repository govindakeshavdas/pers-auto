name: meetups

on:
  schedule:
    # Monday 13:00 UTC (6am PT)
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  find-and-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Find events with OpenAI + email via Resend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          set -euo pipefail

          # 1. Ask OpenAI (Responses API) to run the prompt with web search.
          prompt=$(cat meetups/prompt.md)
          openai_response=$(jq -n \
            --arg model "gpt-4.1" \
            --arg input "$prompt" \
            '{model:$model, input:$input, tools:[{type:"web_search_preview"}]}' \
          | curl -sS https://api.openai.com/v1/responses \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              --data-binary @- \
              --fail-with-body)

          # 2. Extract the final assistant text.
          body=$(echo "$openai_response" | jq -r '
            .output_text //
            ([.output[]?.content[]? | select(.type=="output_text") | .text] | join("\n")) //
            empty
          ')

          if [ -z "$body" ]; then
            echo "No output text from OpenAI. Raw response:" >&2
            echo "$openai_response" >&2
            exit 1
          fi

          # 3. Email via Resend.
          jq -n \
            --arg from "$MAIL_FROM" \
            --arg to "$MAIL_TO" \
            --arg subject "Bay Area events this week" \
            --arg text "$body" \
            '{from:$from, to:[$to], subject:$subject, text:$text}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              --data-binary @- \
              --fail-with-body
