name: meetups

on:
  schedule:
    # Sunday 6pm PT = Monday 01:00 UTC (PDT; 02:00 UTC during PST)
    - cron: "0 1 * * 1"
  workflow_dispatch:

jobs:
  find-and-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Find events + email via Resend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          set -euo pipefail

          # Run the prompt via meetups/run.sh (hits Anthropic API directly).
          body=$(./meetups/run.sh)

          if [ -z "$body" ]; then
            echo "Empty response from run.sh" >&2
            exit 1
          fi

          # Email via Resend.
          jq -n \
            --arg from "$MAIL_FROM" \
            --arg to "$MAIL_TO" \
            --arg subject "Bay Area events this week" \
            --arg html "$body" \
            '{from:$from, to:[$to, "satyendramishra.nsit@gmail.com"], subject:$subject, html:$html}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              --data-binary @- \
              --fail-with-body
